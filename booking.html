<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Your Stay | Lumina Grand</title>
    <meta name="description" content="Reserve your luxury experience at Lumina Grand. Secure online booking for our exclusive rooms and suites.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-beige">
    <header id="main-nav" class="scrolled">
        <nav class="container">
            <div class="logo">LUMINA GRAND</div>...
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="index.html#rooms">Rooms</a></li>
                <li><a href="booking.html" class="active">Booking</a></li>
                <li><a href="dashboard.html">Dashboard</a></li>
            </ul>
            <div class="mobile-menu-btn">
                <span></span>
                <span></span>
            </div>
        </nav>
    </header>

    <main class="booking-page">
        <div class="container centered-content">
            <section class="booking-container">
                <div class="booking-form-card">
                    <div class="form-header">
                        <span class="subtitle">RESERVATION</span>
                        <h2>Book Your Stay</h2>
                    </div>
                    
                    <form id="booking-form">
                        <div id="error-message" class="error-message"></div>
                        <div class="form-group">
                            <label for="name">Full Name</label>
                            <input type="text" id="name" placeholder="John Doe" required>
                        </div>
                        
                        <div class="form-row">
                            <div class="form-group">
                                <label for="check-in">Check-in Date</label>
                                <input type="date" id="check-in" required>
                            </div>
                            <div class="form-group">
                                <label for="check-out">Check-out Date</label>
                                <input type="date" id="check-out" required>
                            </div>
                        </div>
                        
                        <div class="form-group">
                            <label for="room-type">Select Room</label>
                            <select id="room-type" required>
                                <option value="" disabled selected>Choose a room or suite</option>
                                <option value="deluxe-ocean">Deluxe Ocean Suite - $450/night</option>
                                <option value="presidency">Presidency Suite - $1,200/night</option>
                                <option value="garden-vista">Garden Vista Room - $320/night</option>
                                <option value="skyline">Skyline Executive - $580/night</option>
                                <option value="royal">Royal Penthouse - $2,500/night</option>
                                <option value="heritage">Heritage Studio - $280/night</option>
                            </select>
                        </div>
                        
                        <button type="submit" class="btn btn-primary full-width">Confirm Booking</button>
                    </form>
                </div>

                <div class="booking-summary-card">
                    <h3>Booking Summary</h3>
                    <div class="summary-details">
                        <div class="summary-item">
                            <span>Room Type</span>
                            <span id="summary-room">-</span>
                        </div>
                        <div class="summary-item">
                            <span>Nights</span>
                            <span id="summary-nights">0</span>
                        </div>
                        <div class="summary-item total">
                            <span>Total Amount</span>
                            <span id="summary-total">$0</span>
                        </div>
                    </div>
                    <p class="summary-note">Taxes and service fees included.</p>
                </div>
            </section>
        </div>
    </main>

    <script src="script.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const urlParams = new URLSearchParams(window.location.search);
            const roomParam = urlParams.get('room');
            if (roomParam) {
                const roomSelect = document.getElementById('room-type');
                if (roomSelect) {
                    roomSelect.value = roomParam;
                    // Trigger change event to update pricing summary
                    roomSelect.dispatchEvent(new Event('change'));
                }
            }
        });
    </script>
</body>
</html>
